name: Update FEC Tracker

on:
  schedule:
    # Every 6 hours. FEC filings/itemized data don't change faster than that
    # in practice, and this keeps you well under the 1,000 calls/hour limit.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest FEC data
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python fetch_data.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit updated data + dashboard
        run: |
          git config user.name "fec-tracker-bot"
          git config user.email "actions@github.com"
          git add data/ dashboard.html
          git diff --quiet --cached || git commit -m "Update FEC data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp dashboard.html public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
